<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Guesser — Tests</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="card">
    <h1>Number Guesser — Tests</h1>
    <div id="test-results"></div>
  </main>

  <!--
    The game's UI elements are included below so that:
      1. ui.js can attach its event listeners without errors, and
      2. the DOM integration tests can confirm the required elements exist.
    They are kept out of the way (visually hidden) because this page is only for tests.
  -->
  <div hidden aria-hidden="true">
    <input id="guess-input" type="number" min="1" max="100">
    <button id="guess-btn" type="button">Guess</button>
    <p id="message"></p>
    <p id="attempts-display">Attempts left: 10</p>
    <ul id="history-list"></ul>
    <button id="restart-btn" type="button" hidden>Play Again</button>
  </div>

  <!-- Load the code under test first, then the test runner -->
  <script src="game.js"></script>
  <script src="ui.js"></script>
  <script src="tests.js"></script>
</body>
</html>
